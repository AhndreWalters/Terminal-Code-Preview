<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Code Preview</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 20px;
            padding: 20px;
        }

        .section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .section-title {
            background: #333;
            color: white;
            padding: 15px;
            font-weight: bold;
            font-size: 14px;
        }

        .input-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        textarea {
            flex: 1;
            border: none;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            color: #333;
            background: white;
        }

        textarea::placeholder {
            color: #999;
        }

        .button-bar {
            padding: 15px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background: #007bff;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover {
            background: #0056b3;
        }

        button:active {
            transform: scale(0.98);
        }

        .terminal {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            overflow: hidden;
            position: relative;
        }

        #terminal-output {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            outline: none;
        }

        #terminal-output::-webkit-scrollbar {
            width: 8px;
        }

        #terminal-output::-webkit-scrollbar-track {
            background: #333;
        }

        #terminal-output::-webkit-scrollbar-thumb {
            background: #666;
            border-radius: 4px;
        }

        #terminal-output::-webkit-scrollbar-thumb:hover {
            background: #888;
        }

        .terminal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="section">
            <div class="section-title">📝 Input Code/Commands</div>
            <div class="input-area">
                <textarea id="input-text" placeholder="Paste your terminal commands here...">5.1 Backup Performed

A backup of the switch running configuration was performed on the physical Layer 2 switch. The configuration was saved to a text file using the show running-config command output captured to a text file. This backup serves as a restore point in case of switch failure or misconfiguration.

Backup Method Used:
text

show running-config > backup.txt</textarea>
                <div class="button-bar">
                    <button onclick="clearInput()">🗑️ Clear</button>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🖥️ Terminal Preview</div>
            <div class="terminal">
                <div id="terminal-output"></div>
            </div>
            <div class="button-bar">
                <button onclick="takeScreenshot()">📸 Take Screenshot</button>
            </div>
        </div>
    </div>

    <script>
        const inputText = document.getElementById('input-text');
        const terminalOutput = document.getElementById('terminal-output');

        // Update terminal on input
        inputText.addEventListener('input', updateTerminal);
        inputText.addEventListener('change', updateTerminal);

        // Initialize terminal on page load
        window.addEventListener('load', updateTerminal);

        function updateTerminal() {
            terminalOutput.textContent = inputText.value;
        }

        function clearInput() {
            if (confirm('Are you sure you want to clear all text?')) {
                inputText.value = '';
                updateTerminal();
                inputText.focus();
            }
        }

        function takeScreenshot() {
            const terminal = document.querySelector('.terminal');
            
            html2canvas(terminal, {
                backgroundColor: '#1e1e1e',
                scale: 2,
                useCORS: true,
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = `terminal-${Date.now()}.png`;
                link.click();
            }).catch(err => {
                alert('Screenshot failed: ' + err.message);
                console.error(err);
            });
        }
    </script>
</body>
</html>
